name: Bug Report
description: Report a reproducible bug to help us improve the extension
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please provide as much detail as possible.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug
      placeholder: Describe the issue
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: List exact steps to reproduce the behavior
      placeholder: |
        1. Open ...
        2. Click ...
        3. Observe ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: Describe what you expected to happen
    validations:
      required: true

  - type: input
    id: extensionVersion
    attributes:
      label: Extension version
      placeholder: 1.4.1
    validations:
      required: true

  - type: input
    id: vscodeVersion
    attributes:
      label: VS Code version
      placeholder: 1.xx.x
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: macOS / Windows / Linux
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or screenshots
      description: Paste logs, stack traces, or screenshots if available
      render: shell
