name: Feature Request
description: Suggest an idea or improvement for the extension
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the suggestion. Clear use-cases help us prioritize.

  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What problem are you trying to solve?
      placeholder: Describe the current limitation
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe the behavior you want
      placeholder: Describe your ideal outcome
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches or workarounds you tried

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Screenshots, references, or related tools
