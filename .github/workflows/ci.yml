name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test-extension:
    name: Test Extension
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Compile TypeScript
        run: npm run compile

      - name: Run ESLint
        run: npm run lint

      - name: Run tests
        run: npm run test

  test-webview:
    name: Test Webview UI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./webview-ui
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ./webview-ui/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build webview
        run: npm run build

      - name: Run ESLint
        run: npm run lint

      - name: Run tests
        run: npm run test

  build:
    name: Build Extension
    runs-on: ubuntu-latest
    needs: [test-extension, test-webview]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install root dependencies
        run: npm ci

      - name: Install webview dependencies
        working-directory: ./webview-ui
        run: npm ci

      - name: Build extension (vscode:prepublish)
        run: npm run vscode:prepublish
